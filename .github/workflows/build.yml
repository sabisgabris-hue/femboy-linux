name: Build Femboy Linux ISO
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools

      - name: Build ISO
        run: |
          # Criar uma pasta limpa fora da raiz do checkout
          mkdir -p $HOME/build_area
          cd $HOME/build_area
          
          # Configuração mínima e robusta
          sudo lb config --debian-installer live --archive-areas "main contrib non-free" --non-interactive
          
          # Rodar o build de verdade
          sudo lb build
          
          # Mover a ISO pronta para onde o GitHub consegue ver
          mkdir -p $GITHUB_WORKSPACE/output
          sudo mv *.iso $GITHUB_WORKSPACE/output/ 2>/dev/null || echo "ISO não encontrada"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Femboy-Linux-ISO
          path: output/*.iso

