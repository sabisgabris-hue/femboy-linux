name: Build Femboy Linux ISO
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar Script de Build
        run: |
          # Dar permissão e rodar como root total no servidor
          chmod +x build_distro.sh
          sudo ./build_distro.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Femboy-Linux-ISO
          path: output/*.iso

